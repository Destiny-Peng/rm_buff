%YAML:1.0
---

####################################
# 该文件用于初始化一些参数
# 同时，在base.h中开启USER_TUNE_PARAM该文件参数每隔1s可被重复加载，从而实现热调参的功能

##########################################
# 匀角速度卡尔曼滤波器调参
R_00: 6907  #36360 #36360 # 角度测量值方�??
R_11: 5200  #4070 #2092
R_22: 1900  #13195 #15530 #12599.0 # 角度测量值方�??

Q_00: 1600 #2100 #200 #20.0 # 过程角度�??声方�??
Q_11: 6282 #3282 # 过程角速度�??声方�??3282.80
Q_22: 700   #300

Q_33: 700 #200 #50  #17 
Q_44: 2200 #1200 
Q_55: 300 #100

Q_66: 900 #100 #20
Q_77: 813

dis_tolerance: 0.3
dis_confidence: 1
v_confidence: 1
a_confidence: 0
##########################################
# EKF参数
w_y: 42.9718    #0.75*180/Util::PI;
w_yy: 183.3465   #3.2*180/Util::PI;
w_d: 57.2958   #180/Util::PI;
w_dd: 57.2958  #180/Util::PI;
w_p: 2.8648   #0.05*180/Util::PI;
w_pp: 5729.5780 #100*180/Util::PI;

#########################################
# 时间帧对齐参数
synchronizor: 0
#########################################

#########################################
# 发弹延时,单位s
shoot_delay: 0.05
#########################################


#########################################
# 平移量
X_OFFSET: 0.0
Y_OFFSET: 120.3  #-140.0
Z_OFFSET: 44.5   #100
#########################################

#########################################
# 弹丸质量
bullet_m: 3.2e-3 # 小弹丸
# bullet_m: 4.1e-2 # 大弹丸

# 弹丸空气阻力系数
bullet_k: 7.1655e-5 # 小弹丸
# bullet_k: 4.5857e-4 # 大弹丸

bullet_r: 8.4e-3 # 小弹丸半径
# bullet_r: 21.25e-3 # 大弹丸半径
#########################################


#########################################
# 接收角度偏移量调节
armor_yaw_offset: 0.23 #0.35
armor_pitch_offset: 6.37 #6.74  #6.5 #-3.7
rune_yaw_offset: 0.0
rune_pitch_offset: 0.0
# 发送角度偏移量
send_armor_pitch_default: 2.0 #1.7 
send_armor_yaw_default: 0.0
#########################################


#########################################
# 击打前哨战参数
outpost_height: 1.23 #单位m
robot_height: 0.35 #单位m

# 旋转前哨站发送延时
dynatic_shoot_delay: 20

# 旋转前哨站击打比例(0.5是全占比，禁止大于0.5)
dynatic_shoot_proportion: 0.35

#########################################

# ekf参数
#########################################
Cov_mu: !!opencv-matrix
   rows: 5
   cols: 1
   dt: d
   data: [5, 5, 0.5, 50, 1]
   # data: [0.1, 0.1, 0.1, 50, 1]
# 过程噪声协方差矩阵，含义为：D(a_x), D(a_y), D(a_z), D(a_theta), D(v_r)

R: !!opencv-matrix
   rows: 4
   cols: 1
   dt: d
   data: [0.01, 0.01, 0.2, 0.09]
#########################################
