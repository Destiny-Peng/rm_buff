%YAML:1.0
---
### Robot ID: 玻布
####################################
# 该文件用于初始化一些参数
# 同时，在base.h中开启USER_TUNE_PARAM该文件参数每隔1s可被重复加载，从而实现热调参的功能

##########################################
# 匀角速度卡尔曼滤波器调参
R_00: 4585 #4420 #36360 #36360 # 角度测量值方�??
R_11: 4775 #175 #4070 #2092
R_22: 7695 #13195 #13195 #15530 #12599.0 # 角度测量值方�??

Q_00: 2100 #200 #20.0 # 过程角度�??声方�??
Q_11: 12282 #2282 #3282 # 过程角速度�??声方�??3282.80
Q_22: 1200   #300

Q_33: 700 #200 #50  #17 
Q_44: 1500 #1200 
Q_55: 100 #100


Q_66: 2000 #100 #20
Q_77: 1313

dis_tolerance: 0.3
dis_confidence: 1
v_confidence: 0.3
a_confidence: 0.001
##########################################
# EKF参数
w_y: 42.9718    #0.75*180/Util::PI;
w_yy: 183.3465   #3.2*180/Util::PI;
w_d: 57.2958   #180/Util::PI;
w_dd: 57.2958  #180/Util::PI;
w_p: 2.8648   #0.05*180/Util::PI;
w_pp: 5729.5780 #100*180/Util::PI;

#########################################
# 时间帧对齐参数
synchronizor: 0 #-14 #50 #2.5 #2.5
#########################################

#########################################
# 发弹延时,单位s
shoot_delay: 0.09
#########################################


#########################################
# 平移量
X_OFFSET: -85.5
Y_OFFSET: -45.0  #-107.518
Z_OFFSET: 99 #73.771
#########################################

#########################################
# 弹丸质量
bullet_m: 3.2e-3 # 小弹丸
#bullet_m: 4.1e-2 # 大弹丸

# 弹丸空气阻力系数
bullet_k: 7.1655e-5 # 小弹丸
#bullet_k: 4.5857e-4 # 大弹丸

bullet_r: 8.4e-3 # 小弹丸半径
# bullet_r: 21.25e-3 # 大弹丸半径
#########################################


#########################################
#自瞄调试（开始）
# 接收角度偏移量调节
armor_yaw_offset: 0.05
armor_pitch_offset: -0.55 #0.8 #1.15
armor_roll_offset: -0.1 #-0.03
# 发送角度偏移量
send_armor_pitch_default: 0.2 #-1.8
send_armor_yaw_default: 0.0
#自瞄调试（结束）
pitchBase0: -7.88 
pitchError0: 0.19642863768051289
kPitch0: 0.3239586042970215
pitchBase1: -7.3 
pitchError1: 0.328845327752743
kPitch1: 0.22830463805556914
pitchBase2: -6.82 
pitchError2: 0.5006230496898811
kPitch2: 0.3578702540357048
pitchBase3: -2.65 
pitchError3: 0.6797023125979684
kPitch3: 0.04294466736404971

rune_yaw_offset: 0.0
rune_pitch_offset: 0.03
rune_k: -0.01
rune_low_pitch: -1.14
# 发送角度偏移量


send_rune_pitch_offset: 0.30
send_rune_yaw_offset: 0.00
rune_trajectory_k: 0.055
#########################################


#########################################
# 击打前哨战参数
outpost_height: 1.23 #单位m
robot_height: 0.355 #单位m



# 旋转前哨站接收偏移数据
dynatic_yaw_offset: 0.0
dynatic_pitch_offset: 1.36 #-2.8 #-2.6 #-2.8 #0.0 #-2.4
dynatic_roll_offset: -0.1 #0.8

# 旋转前哨站发送pitch偏移量
send_dynatic_pitch_offset: -0.1
# 旋转前哨站发送yaw偏移量
send_dynatic_yaw_offset: -0.2
# 旋转前哨站发送延时
dynatic_shoot_delay: 20

# 旋转前哨站击打比例(0.5是全占比，禁止大于0.5)
dynatic_shoot_proportion: 0.5


#########################################

# ekf参数
#########################################
Cov_mu: !!opencv-matrix
   rows: 5
   cols: 1
   dt: d
   data: [5, 5, 0.5, 50, 1]
   # data: [0.1, 0.1, 0.1, 50, 1]
# 过程噪声协方差矩阵，含义为：D(a_x), D(a_y), D(a_z), D(a_theta), D(v_r)

R: !!opencv-matrix
   rows: 4
   cols: 1
   dt: d
   data: [0.01, 0.01, 0.2, 0.09]
#########################################
