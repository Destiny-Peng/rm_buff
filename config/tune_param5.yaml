%YAML:1.0
---
### Robot ID: 碳布
####################################
# 该文件用于初始化一些参数
# 同时，在base.h中开启USER_TUNE_PARAM该文件参数每隔1s可被重复加载，从而实现热调参的功能

##########################################
# 匀角速度卡尔曼滤波器调参
# R_00: 1620 #3910 #2610 #610  #794  #1313.10 # 角度测量值方�??
# R_11: 7200 #3100 #2900  #1104 #6500
# R_22: 6100 #3288 #776 #1313.10 # 角度测量值方�??

# Q_00: 2200 #20.0 # 过程角度�??声方�??
# Q_11: 12000 #10000 #10000 #20000 #16282 # 过程角速度�??声方�??3282.80
# Q_22: 7700 #800   #300

# Q_33: 600 #300 #150 #17 
# Q_44: 11200 #6800 #10200 #4200
# Q_55: 5600 #1100 #100

# Q_66: 180 #20
# Q_77: 800 #1000 #1313

# dis_tolerance: 0.3
# dis_confidence: 1
# v_confidence: 0.27
# a_confidence: 0.002

R_00: 1620 #3910 #2610 #610  #794  #1313.10 # 角度测量值方�??
R_11: 10200 #3100 #2900  #1104 #6500
R_22: 6100 #3288 #776 #1313.10 # 角度测量值方�??

Q_00: 2200 #20.0 # 过程角度�??声方�??
Q_11: 32000 #24000 #10000 #10000 #20000 #16282 # 过程角速度�??声方�??3282.80
Q_22: 7000 #800   #300

Q_33: 600 #300 #150 #17 
Q_44: 11200 #6800 #10200 #4200
Q_55: 5600 #1100 #100

Q_66: 180 #20
Q_77: 800 #1000 #1313

dis_tolerance: 0.3
dis_confidence: 1
v_confidence: 1
a_confidence: 0
##########################################
# EKF参数
w_y: 42.9718    #0.75*180/Util::PI;
w_yy: 183.3465   #3.2*180/Util::PI;
w_d: 57.2958   #180/Util::PI;
w_dd: 57.2958  #180/Util::PI;
w_p: 2.8648   #0.05*180/Util::PI;
w_pp: 5729.5780 #100*180/Util::PI;

#########################################
# 时间帧对齐参数
synchronizor: 2
#########################################

#########################################
# 发弹延时,单位s
shoot_delay: 0.005
#########################################


#########################################
# 平移量
X_OFFSET: 0.0
Y_OFFSET: -42.518  #-107.518
Z_OFFSET: 103.771 #73.771
#########################################

#########################################
# 弹丸质量
bullet_m: 3.2e-3 # 小弹丸
#bullet_m: 4.1e-2 # 大弹丸

# 弹丸空气阻力系数
bullet_k: 7.1655e-5 # 小弹丸
#bullet_k: 4.5857e-4 # 大弹丸

bullet_r: 8.4e-3 # 小弹丸半径
# bullet_r: 21.25e-3 # 大弹丸半径
#########################################


#########################################
# 接收角度偏移量调节
armor_yaw_offset: 0.2
armor_pitch_offset: 1.2 #1.1 #1.24 #1.36
armor_roll_offset: -0.1

pitchBase0: -7.61 
pitchError0: -0.08
kPitch0: 0.404624
pitchBase1: -7.04 
pitchError1: 0.057
kPitch1: 0.240350877
pitchBase2: -7.04 
pitchError2: 0.057
kPitch2: 0.240350877
pitchBase3: -7.04 
pitchError3: 0.057
kPitch3: 0.009043927

rune_yaw_offset: 0.0
rune_pitch_offset: 1.11939 #0.78 #1.132
rune_k: -0.010636 #-0.02465 #-0.02385
rune_low_pitch: 3.72168 #-0.597778 #-0.668
# 发送角度偏移量
send_armor_pitch_default: 0 #-0.5 #-0.1
send_armor_yaw_default: 0.0 #-0.2
send_rune_pitch_offset: 0.15 #0.55
send_rune_yaw_offset: 0.62 #0.77 #-0.4
rune_trajectory_k: 0.087 #0.045 #0.065
#########################################


#########################################
# 击打前哨战参数
outpost_height: 1.23 #单位m
robot_height: 0.355 #单位m



# 旋转前哨站接收偏移数据
dynatic_yaw_offset: 0.0
dynatic_pitch_offset: 1.36 #-2.8 #-2.6 #-2.8 #0.0 #-2.4
dynatic_roll_offset: -0.1 #0.8

# 旋转前哨站发送pitch偏移量
send_dynatic_pitch_offset: -0.1
# 旋转前哨站发送yaw偏移量
send_dynatic_yaw_offset: -0.0
# 旋转前哨站发送延时
dynatic_shoot_delay: 20

# 旋转前哨站击打比例(0.5是全占比，禁止大于0.5)
dynatic_shoot_proportion: 0.45


#########################################



# ekf参数
#########################################
Cov_mu: !!opencv-matrix
   rows: 5
   cols: 1
   dt: d
   data: [5, 5, 0.5, 50, 1]
   # data: [0.1, 0.1, 0.1, 50, 1]
# 过程噪声协方差矩阵，含义为：D(a_x), D(a_y), D(a_z), D(a_theta), D(v_r)

R: !!opencv-matrix
   rows: 4
   cols: 1
   dt: d
   data: [0.01, 0.01, 0.2, 0.09]
#########################################
